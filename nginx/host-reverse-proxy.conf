# === Shared Reverse Proxy — Host Nginx ===
# Clean proxy: routes by hostname, nothing else.
# All routing logic lives inside each app, not here.

# --- SSL shared settings ---
# ssl_protocols and ssl_prefer_server_ciphers are set in /etc/nginx/nginx.conf
ssl_certificate     /etc/ssl/cloudflare/origin.crt;
ssl_certificate_key /etc/ssl/cloudflare/origin.key;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# === HTTP -> HTTPS ===
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

# === Apex redirect ===
server {
    listen 443 ssl;
    http2 on;
    server_name redecm.com.br;
    server_tokens off;
    return 308 https://melogas.redecm.com.br$request_uri;
}

# === Revendagas ===
server {
    listen 443 ssl default_server;
    http2 on;
    server_name melogas.redecm.com.br adminmelogas.redecm.com.br entregadormelogas.redecm.com.br;
    server_tokens off;
    client_max_body_size 5m;

    location / {
        proxy_pass https://127.0.0.1:8443;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_hide_header X-Powered-By;
    }
}

# === Quatro Ventos ===
server {
    listen 443 ssl;
    http2 on;
    server_name quatroventos.redecm.com.br adminquatroventos.redecm.com.br;
    server_tokens off;
    client_max_body_size 50m;

    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_hide_header X-Powered-By;
    }
}
