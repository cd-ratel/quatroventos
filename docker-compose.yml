name: quatroventos

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quatroventos-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quatroventos-net
      - revendagas_default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/settings || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:18-alpine
    container_name: quatroventos-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quatroventos-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # One-off migration runner
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quatroventos-migrate
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    profiles:
      - setup
    networks:
      - quatroventos-net

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  quatroventos-net:
    name: quatroventos-net
    driver: bridge
  revendagas_default:
    external: true
